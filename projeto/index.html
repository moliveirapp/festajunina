<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Xilindró Digital 🌽</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fredoka+One&family=Handlee&display=swap");

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        background-color: #f39c12;
        /* Tecido de chita/xadrez caipira feito à mão */
        background-image:
          linear-gradient(90deg, rgba(192, 57, 43, 0.15) 50%, transparent 50%),
          linear-gradient(rgba(192, 57, 43, 0.15) 50%, transparent 50%);
        background-size: 24px 24px;
        font-family: "Handlee", cursive;
        color: #4a2711;
        margin: 0;
        padding: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      /* O Container principal imita um cartaz de papel Kraft antigo */
      .container {
        background: #fffdf3;
        border: 4px dashed #8b5a2b; /* Linha pontilhada imitando costura de retalho */
        border-radius: 24px; /* Bordas bem arredondadas e amigáveis */
        padding: 25px 18px;
        width: 100%;
        max-width: 450px;
        /* Sombra sólida (massa) que parece recortada no papel */
        box-shadow: 6px 6px 0px #4a2711;
        position: relative;
      }

      /* Enfeite de Bandeirinhas Juninas */
      .bandeirinhas {
        display: flex;
        justify-content: space-around;
        position: absolute;
        top: -8px;
        left: 0;
        width: 100%;
        padding: 0;
        margin: 0;
        list-style: none;
      }
      .bandeirinha {
        width: 24px;
        height: 32px;
        clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 50% 75%, 0% 100%);
        border-radius: 2px;
      }
      .b1 {
        background: #e74c3c;
      }
      .b2 {
        background: #2ecc71;
      }
      .b3 {
        background: #3498db;
      }
      .b4 {
        background: #f1c40f;
      }
      .b5 {
        background: #9b59b6;
      }

      h1 {
        font-family: "Fredoka One", cursive;
        color: #962d2d;
        font-size: 2rem;
        text-align: center;
        margin-top: 20px;
        margin-bottom: 2px;
        text-shadow: 1px 1px 0px #f5cd79;
      }

      .sub {
        text-align: center;
        font-size: 1rem;
        font-weight: bold;
        color: #8b5a2b;
        margin-bottom: 22px;
        padding-bottom: 8px;
        border-bottom: 2px dotted #8b5a2b;
      }

      /* Painéis internos simulando barraquinhas de feira */
      .formulario {
        background: #fbf4db;
        padding: 18px;
        border: 3px solid #6d4c41;
        border-radius: 18px; /* Arredondado sutil para parecer madeira lixada */
        margin-bottom: 20px;
        box-shadow: inset 0 0 8px rgba(139, 90, 43, 0.15);
      }

      .secao-alternavel {
        display: none;
      }
      .secao-alternavel.ativa {
        display: block;
      }

      .campo {
        display: flex;
        flex-direction: column;
        margin-bottom: 14px;
      }

      label {
        font-weight: bold;
        color: #962d2d;
        margin-bottom: 5px;
        font-size: 1.1rem;
      }

      /* Inputs arredondados confortáveis */
      input,
      select {
        padding: 11px 14px;
        font-family: "Handlee", cursive;
        font-size: 1.1rem;
        border: 2px solid #5d4037;
        border-radius: 12px; /* Visual fofinho e orgânico */
        outline: none;
        background: #fff;
        color: #4a2711;
        box-shadow: inset 1px 2px 4px rgba(0, 0, 0, 0.05);
      }

      input:focus,
      select:focus {
        border-color: #962d2d;
        background: #fffdf9;
      }

      .area-scanner {
        margin-bottom: 15px;
        text-align: center;
      }

      #reader,
      #reader-busca {
        width: 100%;
        background: #1a1a1a;
        border: 3px solid #5d4037;
        border-radius: 16px;
        overflow: hidden;
        display: none;
        margin-top: 8px;
      }

      /* Botões imitando Placas de Sinalização de Madeira */
      .btn-scanner {
        background: #8b5a2b;
        color: #fffdf3;
        font-family: "Fredoka One", cursive;
        padding: 11px;
        border: 2px solid #4a2711;
        border-radius: 14px;
        width: 100%;
        margin-bottom: 10px;
        cursor: pointer;
        font-size: 1rem;
        box-shadow: 0px 4px 0px #4a2711;
      }
      .btn-scanner:active {
        box-shadow: 0px 0px 0px #4a2711;
        transform: translateY(4px);
      }

      /* Botão de Alternar Painéis */
      .btn-alternar {
        background: #e67e22;
        color: #fffdf3;
        font-family: "Fredoka One", cursive;
        padding: 12px;
        border: 2px solid #4a2711;
        border-radius: 16px;
        width: 100%;
        margin-bottom: 22px;
        cursor: pointer;
        font-size: 1.05rem;
        box-shadow: 0px 4px 0px #4a2711;
      }
      .btn-alternar:active {
        box-shadow: 0px 0px 0px #4a2711;
        transform: translateY(4px);
      }

      /* Botão Principal de Prisão */
      button.btn-prender {
        background: #cd3d3d;
        color: #fffdf3;
        font-family: "Fredoka One", cursive;
        font-size: 1.25rem;
        padding: 12px;
        border: 2px solid #4a2711;
        border-radius: 16px;
        cursor: pointer;
        width: 100%;
        box-shadow: 0px 5px 0px #4a2711;
      }
      button.btn-prender:active {
        box-shadow: 0px 0px 0px #4a2711;
        transform: translateY(5px);
      }

      h2 {
        font-family: "Fredoka One", cursive;
        color: #962d2d;
        font-size: 1.4rem;
        margin-top: 10px;
        margin-bottom: 16px;
        text-align: center;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="50" height="4" viewBox="0 0 50 4"><line x1="0" y1="2" x2="50" y2="2" stroke="%238b5a2b" stroke-width="2" stroke-dasharray="4,4"/></svg>');
        background-position: bottom;
        background-repeat: repeat-x;
        padding-bottom: 8px;
      }

      /* Lista de Cards (Estilo Cartaz de Procurado Artesanal) */
      .lista-container {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .card-preso {
        background: #ffffff;
        border: 2px solid #5d4037;
        border-radius: 16px;
        padding: 16px;
        position: relative;
        box-shadow: 4px 4px 0px #bc8f8f;
      }

      /* Visual do prisioneiro com tempo esgotado */
      .card-preso.alerta-tempo {
        border: 3px solid #cd3d3d;
        background-color: #fff6f6;
        box-shadow: 4px 4px 0px #cd3d3d;
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px dashed #d7ccc8;
        padding-bottom: 8px;
        margin-bottom: 10px;
      }

      .dados-preso {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .nome-preso {
        font-family: "Fredoka One", cursive;
        font-size: 1.2rem;
        color: #962d2d;
      }

      .matricula-preso {
        font-size: 0.95rem;
        font-weight: bold;
        color: #795548;
      }

      /* Placa do tempo restante */
      .cronometro {
        font-family: "Fredoka One", cursive;
        font-size: 1.4rem;
        background: #5d4037;
        padding: 4px 12px;
        color: #fffdf3;
        white-space: nowrap;
        border-radius: 10px;
      }

      .alerta-tempo .cronometro {
        background: #cd3d3d;
        color: white;
      }

      .motivo-preso {
        font-size: 0.95rem;
        color: #4a2711;
        margin-bottom: 14px;
        line-height: 1.4;
        background: #fbfaf0;
        padding: 8px 12px;
        border-radius: 8px;
        border-left: 4px solid #8b5a2b;
      }

      /* Botão de Liberar */
      button.btn-soltar {
        width: 100%;
        background: #27ae60;
        color: white;
        border: 2px solid #1e7e34;
        padding: 9px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 1rem;
        font-family: "Fredoka One", cursive;
        box-shadow: 0px 3px 0px #1e7e34;
      }

      button.btn-soltar:active {
        box-shadow: 0px 0px 0px #1e7e34;
        transform: translateY(3px);
      }

      .sem-presos {
        text-align: center;
        color: #795548;
        font-style: italic;
        font-weight: bold;
        padding: 22px;
        background: #fbf4db;
        border: 2px dashed #8b5a2b;
        border-radius: 16px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <ul class="bandeirinhas">
        <li class="bandeirinha b1"></li>
        <li class="bandeirinha b2"></li>
        <li class="bandeirinha b3"></li>
        <li class="bandeirinha b4"></li>
        <li class="bandeirinha b5"></li>
      </ul>

      <h1>Xilindró Digital 🤠🔒</h1>
      <p class="sub">Controle total dos prisioneiros do Arraial</p>

      <button class="btn-alternar" id="btn-mudar-tela" onclick="alternarTela()">
        🔍 Procurar Preso
      </button>

      <div id="secao-registro" class="secao-alternavel ativa">
        <div class="formulario">
          <div class="campo">
            <label for="tempo">Tempo de Castigo:</label>
            <select id="tempo">
              <option value="600">10 Minutos</option>
              <option value="1200">20 Minutos</option>
              <option value="1800">30 Minutos</option>
            </select>
          </div>

          <div class="area-scanner">
            <button
              class="btn-scanner"
              id="btn-scan"
              onclick="alternarScanner(false)"
            >
              📷 Escanear via QR Code
            </button>
            <div id="reader"></div>
          </div>

          <div class="campo">
            <label for="matricula">Nº da Matrícula:</label>
            <input
              type="text"
              id="matricula"
              placeholder="Digite a matrícula do aluno..."
              autocomplete="off"
            />
          </div>

          <div class="campo">
            <label for="nome">Nome do Aluno:</label>
            <input
              list="lista-alunos"
              type="text"
              id="nome"
              placeholder="Digite o nome do aluno..."
              autocomplete="off"
            />
            <datalist id="lista-alunos"></datalist>
          </div>

          <button class="btn-prender" onclick="adicionarPresoManual()">
            Prender Caboclo! 🔥
          </button>
        </div>
      </div>

      <div id="secao-busca" class="secao-alternavel">
        <div class="formulario">
          <div class="area-scanner">
            <button
              class="btn-scanner"
              id="btn-scan-busca"
              style="background: #e67e22"
              onclick="alternarScanner(true)"
            >
              📷 Pesquisar por QR Code
            </button>
            <div id="reader-busca"></div>
          </div>
          <div class="campo">
            <label for="busca" style="color: #962d2d"
              >Procurar por Nome ou Matrícula:</label
            >
            <input
              type="text"
              id="busca"
              placeholder="Digite para filtrar na hora..."
              oninput="buscarDadosDoServidor()"
              autocomplete="off"
            />
          </div>
        </div>
      </div>

      <h2>Prisioneiros Atuais</h2>
      <div id="listaPresos" class="lista-container"></div>
      <div id="mensagemVazia" class="sem-presos">
        Cadeia vazia! O povo tá na dança da quadrilha. 🌽
      </div>
    </div>

    <script>
      const API_URL = "http://localhost:3000";

      // 🔥 lista de alunos
      let alunos = [];

      // carregar lista.json
      async function carregarAlunos() {
        const res = await fetch("./lista.json");
        alunos = await res.json();

        const datalist = document.getElementById("lista-alunos");
        datalist.innerHTML = "";

        alunos.forEach((aluno) => {
          const option = document.createElement("option");
          option.value = aluno.nome;
          datalist.appendChild(option);
        });
      }

      // 🔍 auto preencher
      document.getElementById("matricula").addEventListener("input", () => {
        const valor = document.getElementById("matricula").value.trim();
        const aluno = alunos.find((a) => a.matricula === valor);
        if (aluno) document.getElementById("nome").value = aluno.nome;
      });

      document.getElementById("nome").addEventListener("input", () => {
        const valor = document.getElementById("nome").value.toLowerCase();
        const aluno = alunos.find((a) => a.nome.toLowerCase().includes(valor));
        if (aluno) document.getElementById("matricula").value = aluno.matricula;
      });

      // 🚀 buscar presos
      function buscarDadosDoServidor() {
        fetch(`${API_URL}/presos`)
          .then((res) => res.json())
          .then((dados) => atualizarPainelMobile(dados))
          .catch((err) => console.error(err));
      }

      // 🔒 prender
      function executarPrisao(matricula, nome) {
        const tempoMin = parseInt(document.getElementById("tempo").value);

        fetch(`${API_URL}/prender`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            nome,
            hora_prisao: new Date().toISOString(),
            tempo: tempoMin,
          }),
        }).then(() => buscarDadosDoServidor());
      }

      // 🔓 soltar
      function soltarPreso(id) {
        fetch(`${API_URL}/soltar/${id}`, { method: "PUT" }).then(() =>
          buscarDadosDoServidor(),
        );
      }

      // botão manual
      function adicionarPresoManual() {
        const mat = document.getElementById("matricula").value.trim();
        const nome = document.getElementById("nome").value.trim();

        if (!nome) {
          alert("Digite o nome do caboclo!");
          return;
        }

        executarPrisao(mat, nome);

        document.getElementById("matricula").value = "";
        document.getElementById("nome").value = "";
      }

      // ⏱️ calcular tempo restante
      function calcularTempoRestante(hora_saida) {
        const diff = new Date(hora_saida) - new Date();

        if (diff <= 0) return 0;

        return Math.floor(diff / 1000);
      }

      // formatar tempo
      function formatarTempo(segundos) {
        if (segundos <= 0) return "SOLTAR! ⚠️";
        const min = Math.floor(segundos / 60);
        const seg = segundos % 60;
        return `${min}:${seg < 10 ? "0" + seg : seg}`;
      }

      // 🖥️ renderizar
      function atualizarPainelMobile(presos) {
        const container = document.getElementById("listaPresos");
        const msg = document.getElementById("mensagemVazia");

        container.innerHTML = "";

        if (!presos || presos.length === 0) {
          msg.style.display = "block";
          return;
        } else {
          msg.style.display = "none";
        }

        presos.forEach((p) => {
          const tempo = calcularTempoRestante(p.hora_saida);

          const card = document.createElement("div");
          card.className = "card-preso";

          if (tempo <= 0) card.classList.add("alerta-tempo");

          card.innerHTML = `
            <div class="card-header">
                <div class="dados-preso">
                    <span class="nome-preso">👤 ${p.nome}</span>
                </div>
                <span class="cronometro">${formatarTempo(tempo)}</span>
            </div>
            <button class="btn-soltar" onclick="soltarPreso('${p.id}')">Liberar da Cadeia 👋</button>
        `;

          container.appendChild(card);
        });
      }

      // init
      carregarAlunos();
      buscarDadosDoServidor();
      setInterval(buscarDadosDoServidor, 2000);
    </script>
  </body>
</html>
