<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel da Cadeia 🌽</title>

    <style>
      body {
        background-color: #f39c12;
        font-family: Arial;
        margin: 0;
        padding: 15px;
      }

      .container {
        background: #fffdf3;
        border: 4px dashed #8b5a2b;
        border-radius: 24px;
        padding: 20px;
        max-width: 500px;
        margin: auto;
      }

      h1,
      h2 {
        text-align: center;
        color: #962d2d;
      }

      .lista-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .card {
        background: white;
        border: 2px solid #5d4037;
        border-radius: 12px;
        padding: 12px;
      }

      .nome {
        font-weight: bold;
        font-size: 1.2rem;
      }

      .tempo {
        font-size: 1.1rem;
        color: #cd3d3d;
      }

      .rank {
        display: flex;
        justify-content: space-between;
        border-bottom: 1px dashed #ccc;
        padding: 6px 0;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>🚨 Cadeia do Arraial</h1>

      <h2>🔴 Prisioneiros Atuais</h2>
      <div id="presos" class="lista-container"></div>

      <h2>🏆 Ranking dos Mais Presos</h2>
      <div id="ranking"></div>
    </div>

    <script>
      const API = "https://festajunina-laura-back-end.onrender.com";

      // 🔴 carregar presos
      async function carregarPresos() {
        const res = await fetch(`${API}/presos`);
        const dados = await res.json();

        const container = document.getElementById("presos");
        container.innerHTML = "";

        dados.forEach((p) => {
          const tempo = calcularTempoRestante(p);

          const div = document.createElement("div");
          div.className = "card";

          div.innerHTML = `
            <div class="nome">${p.nome}</div>
            <div class="tempo">${formatarTempo(tempo)}</div>
        `;

          container.appendChild(div);
        });
      }

      // 🏆 ranking
      async function carregarRanking() {
        const res = await fetch(`${API}/ranking`);
        const dados = await res.json();

        const container = document.getElementById("ranking");
        container.innerHTML = "";

        dados.forEach((r, i) => {
          const div = document.createElement("div");
          div.className = "rank";

          div.innerHTML = `
            <span>${i + 1}º</span>
            <span>${r.nome}</span>
            <span>${r.total}</span>
        `;

          container.appendChild(div);
        });
      }

      // ⏱️ Parse timestamp do Supabase (sem timezone) forçando UTC
      function parsarTimestamp(ts) {
        if (!ts) return null;
        if (/Z$|[+-]\d{2}:?\d{2}$/.test(ts)) return new Date(ts).getTime();
        return new Date(ts.replace(" ", "T") + "Z").getTime();
      }

      // ⏱️ tempo restante — usa hora_saida se existir, senão hora_prisao + tempo
      function calcularTempoRestante(preso) {
        let saida;
        if (preso.hora_saida) {
          saida = parsarTimestamp(preso.hora_saida);
        } else if (preso.hora_prisao && preso.tempo) {
          saida = parsarTimestamp(preso.hora_prisao) + preso.tempo * 60 * 1000;
        } else {
          return 0;
        }
        const diff = saida - new Date().getTime();
        if (diff <= 0) return 0;
        return Math.floor(diff / 1000);
      }

      // ⏱️ formatar
      function formatarTempo(seg) {
        if (seg <= 0) return "Livre 🎉";
        const m = Math.floor(seg / 60);
        const s = seg % 60;
        return `${m}:${s < 10 ? "0" + s : s}`;
      }

      // 🔄 atualizar automático
      setInterval(() => {
        carregarPresos();
        carregarRanking();
      }, 3000);

      // init
      carregarPresos();
      carregarRanking();
    </script>
  </body>
</html>
