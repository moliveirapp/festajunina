<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel da Cadeia 🌽</title>

    <style>
      body {
        background-image: url("./fundo.png");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        font-family: Arial;
        margin: 0;
        padding: 15px;
        min-height: 100vh;
        opacity: 0.95;
      }

      .container {
        background: rgba(255, 253, 243, 0.92);
        border: 4px dashed #8b5a2b;
        border-radius: 24px;
        padding: 20px;
        max-width: 900px;
        margin: auto;
      }

      h1,
      h2 {
        text-align: center;
        color: #962d2d;
      }

      /* Grid de presos: 3 por linha */
      .lista-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .card {
        background: white;
        border: 2px solid #5d4037;
        border-radius: 12px;
        padding: 10px 8px;
        text-align: center;
      }

      .card.alerta {
        border-color: #cd3d3d;
        background: #fff6f6;
      }

      .nome {
        font-weight: bold;
        font-size: 1.15rem;
        color: #4a2711;
        line-height: 1.2;
      }

      .tempo {
        font-size: 1.2rem;
        color: #cd3d3d;
        font-weight: bold;
        margin-top: 4px;
      }

      .rank {
        display: flex;
        justify-content: space-between;
        border-bottom: 1px dashed #ccc;
        padding: 7px 4px;
        font-size: 1.05rem;
      }

      .rank:last-child {
        border-bottom: none;
      }

      .rank .posicao {
        font-weight: bold;
        color: #8b5a2b;
        width: 30px;
      }

      .rank .total {
        font-weight: bold;
        color: #cd3d3d;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>🚨 Cadeia do Arraial</h1>

      <h2>🔴 Prisioneiros Atuais</h2>
      <div id="presos" class="lista-container"></div>

      <h2>🏆 Ranking dos Mais Presos</h2>
      <div id="ranking"></div>
    </div>

    <script>
      const API = "https://festajunina-laura-back-end.onrender.com";

      // Formata nome: primeiro nome + iniciais dos sobrenomes
      // Ex: "FELIPE MAXIMUS RIBEIRO RODRIGUES" → "FELIPE M. R. R."
      function formatarNome(nomeCompleto) {
        const partes = nomeCompleto.trim().split(/\s+/);
        if (partes.length === 1) return partes[0];
        const primeiro = partes[0];
        const iniciais = partes
          .slice(1)
          .map((p) => p[0].toUpperCase() + ".")
          .join(" ");
        return `${primeiro} ${iniciais}`;
      }

      // 🔴 carregar presos
      async function carregarPresos() {
        const res = await fetch(`${API}/presos`);
        const dados = await res.json();

        const container = document.getElementById("presos");
        container.innerHTML = "";

        if (!dados || dados.length === 0) {
          container.innerHTML =
            '<p style="text-align:center;color:#795548;grid-column:1/-1">Cadeia vazia! 🌽</p>';
          return;
        }

        dados.forEach((p) => {
          const tempo = calcularTempoRestante(p);
          const div = document.createElement("div");
          div.className = "card" + (tempo <= 0 ? " alerta" : "");

          div.innerHTML = `
            <div class="nome">${formatarNome(p.nome)}</div>
            <div class="tempo">${formatarTempo(tempo)}</div>
          `;

          container.appendChild(div);
        });
      }

      // 🏆 ranking — top 5
      async function carregarRanking() {
        const res = await fetch(`${API}/ranking`);
        const dados = await res.json();

        const container = document.getElementById("ranking");
        container.innerHTML = "";

        const top5 = dados.slice(0, 5);
        const medalhas = ["🥇", "🥈", "🥉", "4️⃣", "5️⃣"];

        top5.forEach((r, i) => {
          const div = document.createElement("div");
          div.className = "rank";
          div.innerHTML = `
            <span class="posicao">${medalhas[i]}</span>
            <span>${formatarNome(r.nome)}</span>
            <span class="total">${r.total}x</span>
          `;
          container.appendChild(div);
        });
      }

      // ⏱️ Parse timestamp do Supabase (sem timezone) forçando UTC
      function parsarTimestamp(ts) {
        if (!ts) return null;
        if (/Z$|[+-]\d{2}:?\d{2}$/.test(ts)) return new Date(ts).getTime();
        return new Date(ts.replace(" ", "T") + "Z").getTime();
      }

      // ⏱️ tempo restante
      function calcularTempoRestante(preso) {
        let saida;
        if (preso.hora_saida) {
          saida = parsarTimestamp(preso.hora_saida);
        } else if (preso.hora_prisao && preso.tempo) {
          saida = parsarTimestamp(preso.hora_prisao) + preso.tempo * 60 * 1000;
        } else {
          return 0;
        }
        const diff = saida - new Date().getTime();
        if (diff <= 0) return 0;
        return Math.floor(diff / 1000);
      }

      // ⏱️ formatar
      function formatarTempo(seg) {
        if (seg <= 0) return "SOLTAR! ⚠️";
        const m = Math.floor(seg / 60);
        const s = seg % 60;
        return `${m}:${s < 10 ? "0" + s : s}`;
      }

      // 🔄 atualizar automático
      setInterval(() => {
        carregarPresos();
        carregarRanking();
      }, 3000);

      carregarPresos();
      carregarRanking();
    </script>
  </body>
</html>
